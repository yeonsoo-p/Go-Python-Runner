syntax = "proto3";
package runner;
option go_package = "go-python-runner/internal/gen";

service PythonRunner {
  rpc Execute(stream ClientMessage) returns (stream ServerMessage);
}

// Naming convention:
//   - Events (fire-and-forget, no reply expected): bare nouns
//     (Output, Progress, Status, Error, CacheRelease).
//   - Synchronous request/response pairs: `*Request` and `*Response` types.
//     The Python helper holds `_request_lock` across send+recv so responses
//     are delivered to the issuing thread in stream order.

// ClientMessage: sent by Python (gRPC client) to Go (gRPC server).
message ClientMessage {
  oneof msg {
    // Events — Go consumes, no reply.
    Output output = 1;
    Progress progress = 2;
    Status status = 3;
    Error error = 4;
    CacheRelease cache_release = 5;

    // Synchronous requests — Go replies via ServerMessage.
    CacheCreateRequest cache_create = 6;
    CacheLookupRequest cache_lookup = 7;
    FileDialogRequest file_dialog = 8;
    DbExecuteRequest db_execute = 9;
    DbQueryRequest db_query = 10;
  }
}

// ServerMessage: sent by Go (gRPC server) to Python (gRPC client).
message ServerMessage {
  oneof msg {
    // Imperative messages — Python consumes, no reply.
    StartRequest start = 1;
    CancelRequest cancel = 2;

    // Responses paired with ClientMessage requests.
    CacheCreateResponse cache_create_response = 3;
    FileDialogResponse file_dialog_response = 4;
    DbExecuteResponse db_execute_response = 5;
    DbQueryResponse db_query_response = 6;
    CacheLookupResponse cache_lookup_response = 7;
  }
}

message StartRequest {
  map<string, string> params = 1;
}

message CancelRequest {}

message Output {
  string text = 1;
}

message Progress {
  int32 current = 1;
  int32 total = 2;
  string label = 3;
}

message Status {
  // Canonical values: "running" | "completed" | "failed" | "cancelled".
  // Open string (not enum) by design — the four-layer alignment lives in
  // Go (RunStatus consts), Python (STATUS_* consts), and TypeScript (the
  // RunStatus union). Manager is the sole authority on terminal state;
  // Python emits "completed" and "failed", and "cancelled" is set on the
  // Go side when CancelRun was invoked.
  string state = 1;
}

// Severity classifies a structured notification from any source (Python, Go,
// frontend). The reservoir maps this onto a UI surface via persistence axis.
//
// SEVERITY_UNSPECIFIED is a programming bug — every send site must set the
// field explicitly (Python's runner.fail/warn/info always do). Receivers map
// it to SEVERITY_ERROR so the bug fails loudly rather than silently.
enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  SEVERITY_INFO        = 1;
  SEVERITY_WARN        = 2;
  SEVERITY_ERROR       = 3;
  SEVERITY_CRITICAL    = 4;
}

message Error {
  string message = 1;
  string traceback = 2;
  Severity severity = 3;
}

// --- Cache messages ---

// CacheCreateRequest — Python registers a freshly created shm block with Go.
// Reply: CacheCreateResponse. Synchronous: Python blocks until acked, so a
// duplicate-key rejection causes cache_set to raise before the script
// proceeds with a stale assumption that its data was shared.
message CacheCreateRequest {
  string key = 1;
  int64 size = 2;
  string shm_name = 3;
}

message CacheCreateResponse {
  string key = 1;
  CacheCreateError error_code = 2;
  // Human-readable detail. Empty when error_code == CACHE_CREATE_OK.
  string error_message = 3;
}

enum CacheCreateError {
  CACHE_CREATE_OK = 0;
  // Key already registered by an earlier cache_create. Overwriting would
  // orphan the prior shm and silently drop other runs' refs, so Go rejects.
  CACHE_CREATE_DUPLICATE_KEY = 1;
  // Catch-all for unexpected server-side failures. Inspect error_message.
  CACHE_CREATE_INTERNAL = 2;
}

// CacheLookupRequest — Python asks Go to resolve a key to a shm block.
// Reply: CacheLookupResponse. Adds the calling run as a referencer.
message CacheLookupRequest {
  string key = 1;
}

message CacheLookupResponse {
  string key = 1;
  bool found = 2;
  string shm_name = 3;
  int64 size = 4;
}

// CacheRelease — fire-and-forget. Go drops one ref for this runID; if none
// remain, the block is unlinked. No reply: a stale "key not found" release
// is logged Warn+OneShot on the Go side and surfaces only in the LogViewer.
message CacheRelease {
  string key = 1;
}

// --- File dialog messages ---

enum DialogKind {
  DIALOG_KIND_UNSPECIFIED = 0;
  DIALOG_KIND_OPEN = 1;
  DIALOG_KIND_SAVE = 2;
}

message FileDialogRequest {
  DialogKind kind = 1;
  string title = 2;
  repeated FileFilter filters = 3;
  string directory = 4;        // initial directory
  string filename = 5;         // suggested filename (save only)
}

message FileFilter {
  string display_name = 1;     // e.g. "Text Files"
  string pattern = 2;          // e.g. "*.txt"
}

message FileDialogResponse {
  // Exactly one outcome is set. Cancellation is a user choice (silent on
  // Go side); error is an OS-level dialog failure (Go reports it to the
  // reservoir before sending).
  oneof outcome {
    SelectedPaths selected = 1;
    bool cancelled = 2;        // value is always true; presence is the signal
    string error = 3;          // non-empty: dialog implementation failed
  }
}

message SelectedPaths {
  repeated string paths = 1;
}

// --- Database messages ---

message DbExecuteRequest {
  string sql = 1;
  repeated string params = 2;  // positional ? placeholders
}

message DbQueryRequest {
  string sql = 1;
  repeated string params = 2;  // positional ? placeholders
}

message DbExecuteResponse {
  int64 rows_affected = 1;
  int64 last_insert_id = 2;
  string error = 3;            // empty = success
}

message DbRow {
  repeated string values = 1;  // all values as strings; NULL -> ""
}

message DbQueryResponse {
  repeated string columns = 1;
  repeated DbRow rows = 2;
  string error = 3;            // empty = success
}
